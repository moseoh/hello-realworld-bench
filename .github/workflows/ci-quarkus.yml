name: Quarkus CI

on:
  pull_request:
    paths:
      - implementations/java/quarkus/**
      - Makefile
      - .github/workflows/ci-quarkus.yml
  push:
    branches: [main]
    paths:
      - implementations/java/quarkus/**
      - Makefile
      - .github/workflows/ci-quarkus.yml

permissions:
  contents: read

jobs:
  quarkus:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Test Quarkus implementation
        run: make test-quarkus
