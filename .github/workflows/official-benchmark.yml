name: Official benchmark worker

on:
  workflow_call:
    inputs:
      source_sha:
        description: Trusted full commit from the public main branch
        required: true
        type: string
      matrix_json:
        description: JSON array of trusted implementation and scenario cells
        required: false
        type: string
        default: '[{"scenario":"ping-api","load_profile":"platform-qualification-v1"}]'
    secrets:
      PUBLIC_REPO_TOKEN:
        description: Token used only by the GitHub-hosted publication job
        required: true

concurrency:
  group: official-home-k3s
  cancel-in-progress: false

jobs:
  validate-matrix:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Validate benchmark matrix
        env:
          MATRIX_JSON: ${{ inputs.matrix_json }}
        run: |
          jq -e '
            def default_if_empty($default):
              if . == null or . == "" then $default else . end;
            def canonical:
              {
                implementation: (.implementation | default_if_empty("java/spring-boot")),
                variant: (.variant | default_if_empty("jvm-java25")),
                image_key: (.image_key | default_if_empty("spring-boot")),
                scenario: (.scenario // ""),
                load_profile: (.load_profile // "")
              };
            if type != "array" or length == 0 or any(.[]; type != "object") then
              error("matrix_json must be a non-empty array of objects")
            else
              map(canonical)
              | map([.implementation, .variant, .image_key, .scenario, .load_profile]) as $keys
              | if ($keys | length) != ($keys | unique | length) then
                  error("matrix_json contains duplicate benchmark cells")
                else
                  true
                end
            end
          ' <<< "$MATRIX_JSON"

  build:
    needs: [validate-matrix]
    strategy:
      fail-fast: false
      matrix:
        include:
          - implementation: java/spring-boot
            app_dir: implementations/java/spring-boot
            repository: ghcr.io/moseoh/hello-realworld-bench/spring-boot
            image_key: spring-boot
          - implementation: java/quarkus
            app_dir: implementations/java/quarkus
            repository: ghcr.io/moseoh/hello-realworld-bench/quarkus
            image_key: quarkus
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - name: Verify static build cell
        env:
          IMPLEMENTATION: ${{ matrix.implementation }}
          APP_DIR: ${{ matrix.app_dir }}
          REPOSITORY: ${{ matrix.repository }}
          IMAGE_KEY: ${{ matrix.image_key }}
        run: |
          case "$IMPLEMENTATION:$APP_DIR:$REPOSITORY:$IMAGE_KEY" in
            java/spring-boot:implementations/java/spring-boot:ghcr.io/moseoh/hello-realworld-bench/spring-boot:spring-boot | \
            java/quarkus:implementations/java/quarkus:ghcr.io/moseoh/hello-realworld-bench/quarkus:quarkus)
              ;;
            *)
              exit 1
              ;;
          esac
      - uses: actions/checkout@v4
        with:
          repository: moseoh/hello-realworld-bench
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: gradle
      - name: Build target application
        working-directory: ${{ matrix.app_dir }}
        run: ./gradlew clean build --no-daemon
      - uses: docker/setup-buildx-action@v3
      - name: Build immutable target image archive
        id: image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.app_dir }}
          platforms: linux/amd64
          outputs: type=oci,dest=/tmp/target-image.oci.tar
          tags: ${{ matrix.repository }}:${{ inputs.source_sha }}
          provenance: false
      - name: Record immutable image reference
        env:
          REPOSITORY: ${{ matrix.repository }}
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          case "$DIGEST" in
            sha256:*) ;;
            *) exit 1 ;;
          esac
          printf '%s@%s\n' "$REPOSITORY" "$DIGEST" > /tmp/image-ref.txt
      - name: Transfer target image archive
        uses: actions/upload-artifact@v4
        with:
          name: target-image-${{ matrix.image_key }}-${{ inputs.source_sha }}-${{ github.run_id }}
          path: |
            /tmp/target-image.oci.tar
            /tmp/image-ref.txt
          if-no-files-found: error
          retention-days: 1
          compression-level: 0

  benchmark:
    needs: [validate-matrix, build]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(inputs.matrix_json) }}
    runs-on: [self-hosted, linux, x64, hrw-home-k3s]
    timeout-minutes: 60
    env:
      KUBECONFIG: /home/moseoh/.kube/config
    permissions:
      contents: read
    steps:
      - name: Allowlist benchmark cell
        id: allowlist
        env:
          MATRIX_IMPLEMENTATION: ${{ matrix.implementation }}
          MATRIX_VARIANT: ${{ matrix.variant }}
          MATRIX_IMAGE_KEY: ${{ matrix.image_key }}
          MATRIX_SCENARIO: ${{ matrix.scenario }}
          MATRIX_LOAD_PROFILE: ${{ matrix.load_profile }}
        run: |
          implementation="${MATRIX_IMPLEMENTATION:-java/spring-boot}"
          variant="${MATRIX_VARIANT:-jvm-java25}"
          image_key="${MATRIX_IMAGE_KEY:-spring-boot}"
          scenario="$MATRIX_SCENARIO"
          load_profile="$MATRIX_LOAD_PROFILE"

          case "$implementation:$variant:$image_key" in
            java/spring-boot:jvm-java25:spring-boot | \
            java/quarkus:jvm-java25:quarkus)
              ;;
            *)
              exit 1
              ;;
          esac
          case "$scenario:$load_profile" in
            ping-api:platform-qualification-v1 | \
            transactional-command-api:steady | \
            transactional-command-api:capacity-ramp | \
            transactional-command-api:burst-recovery | \
            io-aggregation-api:steady | \
            io-aggregation-api:capacity-ramp | \
            io-aggregation-api:burst-recovery | \
            read-heavy-query-api:steady | \
            read-heavy-query-api:capacity-ramp | \
            read-heavy-query-api:burst-recovery)
              ;;
            *)
              exit 1
              ;;
          esac

          {
            printf 'implementation=%s\n' "$implementation"
            printf 'variant=%s\n' "$variant"
            printf 'image_key=%s\n' "$image_key"
            printf 'scenario=%s\n' "$scenario"
            printf 'load_profile=%s\n' "$load_profile"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: moseoh/hello-realworld-bench
          ref: ${{ inputs.source_sha }}
          persist-credentials: false
          path: source
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: source/runner/uv.lock
      - uses: actions/download-artifact@v4
        with:
          name: target-image-${{ steps.allowlist.outputs.image_key }}-${{ inputs.source_sha }}-${{ github.run_id }}
          path: target-image
      - name: Read immutable image reference
        id: image_ref
        env:
          IMAGE_KEY: ${{ steps.allowlist.outputs.image_key }}
        run: |
          case "$IMAGE_KEY" in
            spring-boot)
              expected_repository=ghcr.io/moseoh/hello-realworld-bench/spring-boot
              ;;
            quarkus)
              expected_repository=ghcr.io/moseoh/hello-realworld-bench/quarkus
              ;;
            *)
              exit 1
              ;;
          esac
          image_ref="$(cat target-image/image-ref.txt)"
          case "$image_ref" in
            "$expected_repository"@sha256:*) ;;
            *) exit 1 ;;
          esac
          digest="${image_ref#"$expected_repository"@}"
          printf '%s\n' "$digest" | grep -Eq '^sha256:[0-9a-f]{64}$'
          printf 'target_image=%s\n' "$image_ref" >> "$GITHUB_OUTPUT"
      - name: Verify trusted source
        working-directory: source
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test -z "$(git status --porcelain)"
          test -f ../target-image/target-image.oci.tar
      - name: Run official qualification set
        id: benchmark
        working-directory: source
        env:
          IMPLEMENTATION: ${{ steps.allowlist.outputs.implementation }}
          VARIANT: ${{ steps.allowlist.outputs.variant }}
          IMAGE_KEY: ${{ steps.allowlist.outputs.image_key }}
          SCENARIO: ${{ steps.allowlist.outputs.scenario }}
          LOAD_PROFILE: ${{ steps.allowlist.outputs.load_profile }}
          HRW_IMAGE_DISTRIBUTION: push
          HRW_TARGET_IMAGE: ${{ steps.image_ref.outputs.target_image }}
          HRW_TARGET_IMAGE_ARCHIVE: ${{ github.workspace }}/target-image/target-image.oci.tar
        run: |
          set -o pipefail
          log_path="../official-${IMAGE_KEY}-${SCENARIO}-${LOAD_PROFILE}.log"
          PYTHONPATH=runner uv run --project runner python -m hrw_runner run-set \
            "$IMPLEMENTATION" "$SCENARIO" "$VARIANT" \
            --environment-profile home-k3s-v1 \
            --measurement-protocol official-service-v1 \
            --load-profile "$LOAD_PROFILE" \
            | tee "$log_path"
          result_dir="$(sed -n 's/^Run set directory: //p' "$log_path" | tail -1)"
          test -n "$result_dir"
          test -f "$result_dir/run-set.json"
          printf 'result_dir=%s\n' "$result_dir" >> "$GITHUB_OUTPUT"
      - name: Transfer raw evidence
        uses: actions/upload-artifact@v4
        with:
          name: official-${{ steps.allowlist.outputs.image_key }}-${{ steps.allowlist.outputs.scenario }}-${{ steps.allowlist.outputs.load_profile }}-${{ inputs.source_sha }}-${{ github.run_id }}
          path: ${{ steps.benchmark.outputs.result_dir }}
          if-no-files-found: error
          retention-days: 90
          compression-level: 6

  publish:
    needs: [validate-matrix, benchmark]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include: ${{ fromJSON(inputs.matrix_json) }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Allowlist publish cell
        id: allowlist
        env:
          MATRIX_IMPLEMENTATION: ${{ matrix.implementation }}
          MATRIX_VARIANT: ${{ matrix.variant }}
          MATRIX_IMAGE_KEY: ${{ matrix.image_key }}
          MATRIX_SCENARIO: ${{ matrix.scenario }}
          MATRIX_LOAD_PROFILE: ${{ matrix.load_profile }}
        run: |
          implementation="${MATRIX_IMPLEMENTATION:-java/spring-boot}"
          variant="${MATRIX_VARIANT:-jvm-java25}"
          image_key="${MATRIX_IMAGE_KEY:-spring-boot}"
          scenario="$MATRIX_SCENARIO"
          load_profile="$MATRIX_LOAD_PROFILE"

          case "$implementation:$variant:$image_key" in
            java/spring-boot:jvm-java25:spring-boot | \
            java/quarkus:jvm-java25:quarkus)
              ;;
            *)
              exit 1
              ;;
          esac
          case "$scenario:$load_profile" in
            ping-api:platform-qualification-v1 | \
            transactional-command-api:steady | \
            transactional-command-api:capacity-ramp | \
            transactional-command-api:burst-recovery | \
            io-aggregation-api:steady | \
            io-aggregation-api:capacity-ramp | \
            io-aggregation-api:burst-recovery | \
            read-heavy-query-api:steady | \
            read-heavy-query-api:capacity-ramp | \
            read-heavy-query-api:burst-recovery)
              ;;
            *)
              exit 1
              ;;
          esac

          {
            printf 'image_key=%s\n' "$image_key"
            printf 'scenario=%s\n' "$scenario"
            printf 'load_profile=%s\n' "$load_profile"
          } >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@v4
        with:
          repository: moseoh/hello-realworld-bench
          ref: ${{ inputs.source_sha }}
          token: ${{ secrets.PUBLIC_REPO_TOKEN }}
          path: source
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: source/runner/uv.lock
      - uses: actions/download-artifact@v4
        with:
          name: official-${{ steps.allowlist.outputs.image_key }}-${{ steps.allowlist.outputs.scenario }}-${{ steps.allowlist.outputs.load_profile }}-${{ inputs.source_sha }}-${{ github.run_id }}
          path: raw-run-set
      - name: Prepare append-only data branch
        working-directory: source
        run: |
          if git fetch origin benchmark-data; then
            git worktree add ../dataset FETCH_HEAD
          else
            git worktree add --detach ../dataset HEAD
            git -C ../dataset switch --orphan benchmark-data
            git -C ../dataset rm -rf --ignore-unmatch .
          fi
      - name: Prepare raw evidence release
        env:
          REPOSITORY: moseoh/hello-realworld-bench
        run: |
          run_set_id="$(jq -r .run_set_id raw-run-set/run-set.json)"
          test -n "$run_set_id"
          tar -C raw-run-set -czf raw-evidence.tar.gz .
          raw_sha="$(sha256sum raw-evidence.tar.gz | cut -d' ' -f1)"
          printf '%s  raw-evidence.tar.gz\n' "$raw_sha" > raw-evidence.tar.gz.sha256
          release_tag="benchmark-evidence-${run_set_id}"
          {
            printf 'RAW_ARTIFACT_SHA256=%s\n' "$raw_sha"
            printf 'RAW_ARTIFACT_URL=https://github.com/%s/releases/download/%s/raw-evidence.tar.gz\n' \
              "$REPOSITORY" "$release_tag"
            printf 'RELEASE_TAG=%s\n' "$release_tag"
          } >> "$GITHUB_ENV"
      - name: Publish validated compact evidence
        working-directory: source
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          WORKFLOW_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          PYTHONPATH=runner uv run --project runner python -m hrw_runner publish \
            ../raw-run-set ../dataset \
            --source-commit "$SOURCE_SHA" \
            --workflow-url "$WORKFLOW_URL" \
            --raw-artifact-url "$RAW_ARTIFACT_URL" \
            --raw-artifact-sha256 "$RAW_ARTIFACT_SHA256"
      - name: Publish idempotent raw evidence release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
          GH_REPO: moseoh/hello-realworld-bench
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            mkdir existing-release
            gh release download "$RELEASE_TAG" --dir existing-release \
              --pattern raw-evidence.tar.gz \
              --pattern raw-evidence.tar.gz.sha256
            cmp raw-evidence.tar.gz existing-release/raw-evidence.tar.gz
            cmp raw-evidence.tar.gz.sha256 existing-release/raw-evidence.tar.gz.sha256
          else
            gh release create "$RELEASE_TAG" \
              raw-evidence.tar.gz \
              raw-evidence.tar.gz.sha256 \
              --target "$SOURCE_SHA" \
              --title "Benchmark evidence ${RELEASE_TAG#benchmark-evidence-}" \
              --notes "Raw evidence for trusted workflow run ${{ github.run_id }}."
          fi
      - name: Commit canonical dataset
        working-directory: dataset
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add catalog.json run-sets
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Publish benchmark ${SOURCE_SHA}"
          git push origin HEAD:benchmark-data
