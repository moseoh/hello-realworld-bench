apiVersion: v1
kind: Namespace
metadata:
  name: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: wiremock-mappings
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: dependency
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
data:
  inventory.json: |
    {
      "request": {"method": "GET", "urlPath": "/inventory"},
      "response": {
        "status": 200,
        "fixedDelayMilliseconds": 25,
        "headers": {"Content-Type": "application/json"},
        "jsonBody": {"sku": "SKU-001", "available": true, "quantity": 42}
      }
    }
  profile.json: |
    {
      "request": {"method": "GET", "urlPath": "/profile"},
      "response": {
        "status": 200,
        "fixedDelayMilliseconds": 20,
        "headers": {"Content-Type": "application/json"},
        "jsonBody": {"id": "customer-001", "tier": "gold", "region": "north-america"}
      }
    }
  recommendations.json: |
    {
      "request": {"method": "GET", "urlPath": "/recommendations"},
      "response": {
        "status": 200,
        "fixedDelayMilliseconds": 35,
        "headers": {"Content-Type": "application/json"},
        "jsonBody": {
          "items": [
            {"sku": "SKU-101", "score": 0.91},
            {"sku": "SKU-102", "score": 0.84}
          ]
        }
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: mock-upstream
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: dependency
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  selector:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: dependency
    hello-real-world/run-set: __RUN_SET_ID__
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: mock-upstream
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: dependency
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  automountServiceAccountToken: false
  nodeSelector:
    kubernetes.io/hostname: homlab
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: wiremock
      image: wiremock/wiremock:3.13.2@sha256:d737d2de3664a7e1bf96f73a7bd48a0d47d61988f7ca88a6e51ea44b8c1f687d
      imagePullPolicy: IfNotPresent
      args:
        - --no-request-journal
        - --container-threads
        - "128"
        - --jetty-accept-queue-size
        - "512"
      ports:
        - name: http
          containerPort: 8080
      readinessProbe:
        httpGet:
          path: /__admin/health
          port: http
        periodSeconds: 1
        timeoutSeconds: 1
        failureThreshold: 30
      resources:
        requests:
          cpu: "1"
          memory: 1Gi
        limits:
          cpu: "1"
          memory: 1Gi
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: mappings
          mountPath: /home/wiremock/mappings
          readOnly: true
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: mappings
      configMap:
        name: wiremock-mappings
    - name: tmp
      emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: target
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: target
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  selector:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: target
    hello-real-world/run-set: __RUN_SET_ID__
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: target
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: target
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  automountServiceAccountToken: false
  nodeSelector:
    kubernetes.io/hostname: homlab
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: target
      image: __TARGET_IMAGE__
      imagePullPolicy: IfNotPresent
      env: __TARGET_ENV__
      ports:
        - name: http
          containerPort: 8080
      readinessProbe:
        httpGet:
          path: /ping
          port: http
        periodSeconds: 1
        timeoutSeconds: 1
        failureThreshold: 30
      resources:
        requests:
          cpu: "2"
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 1Gi
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
data:
  k6.js: __K6_SCRIPT__
---
apiVersion: batch/v1
kind: Job
metadata:
  name: __K6_JOB_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: io-aggregation-api
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: io-aggregation-api
        app.kubernetes.io/component: load-generator
        app.kubernetes.io/part-of: hello-realworld-bench
        hello-real-world/run-set: __RUN_SET_ID__
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: homlab
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: __K6_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /scripts/k6.js
          env:
            - name: BASE_URL
              value: http://target:8080
            - name: DURATION
              value: __K6_DURATION__
            - name: VUS
              value: __K6_VUS__
            - name: HRW_LOAD_EXECUTOR
              value: __HRW_LOAD_EXECUTOR__
            - name: HRW_LOAD_RATE
              value: __HRW_LOAD_RATE__
            - name: HRW_LOAD_STAGES
              value: __HRW_LOAD_STAGES__
            - name: HRW_LOAD_PRE_ALLOCATED_VUS
              value: __HRW_LOAD_PRE_ALLOCATED_VUS__
            - name: HRW_LOAD_MAX_VUS
              value: __HRW_LOAD_MAX_VUS__
          resources:
            requests:
              cpu: "4"
              memory: 3Gi
            limits:
              cpu: "4"
              memory: 3Gi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: k6-script
        - name: tmp
          emptyDir: {}
