apiVersion: v1
kind: Namespace
metadata:
  name: __NAMESPACE__
  labels:
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
---
apiVersion: v1
kind: Service
metadata:
  name: target
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: ping-api
    app.kubernetes.io/component: target
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  selector:
    app.kubernetes.io/name: ping-api
    app.kubernetes.io/component: target
    hello-real-world/run-set: __RUN_SET_ID__
  ports:
    - name: http
      port: 8080
      targetPort: http
---
apiVersion: v1
kind: Pod
metadata:
  name: target
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: ping-api
    app.kubernetes.io/component: target
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  automountServiceAccountToken: false
  nodeSelector:
    kubernetes.io/hostname: homlab
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
    - name: target
      image: __TARGET_IMAGE__
      imagePullPolicy: IfNotPresent
      env:
        - name: JAVA_TOOL_OPTIONS
          value: __JAVA_TOOL_OPTIONS__
        - name: SPRING_THREADS_VIRTUAL_ENABLED
          value: __VIRTUAL_THREADS__
        - name: SPRING_MAIN_KEEP_ALIVE
          value: __KEEP_ALIVE__
      ports:
        - name: http
          containerPort: 8080
      readinessProbe:
        httpGet:
          path: /ping
          port: http
        periodSeconds: 1
        timeoutSeconds: 1
        failureThreshold: 30
      resources:
        requests:
          cpu: "2"
          memory: 1Gi
        limits:
          cpu: "2"
          memory: 1Gi
      securityContext:
        privileged: false
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
      volumeMounts:
        - name: tmp
          mountPath: /tmp
  volumes:
    - name: tmp
      emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: k6-script
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: ping-api
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
data:
  k6.js: __K6_SCRIPT__
---
apiVersion: batch/v1
kind: Job
metadata:
  name: __K6_JOB_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: ping-api
    app.kubernetes.io/component: load-generator
    app.kubernetes.io/part-of: hello-realworld-bench
    hello-real-world/run-set: __RUN_SET_ID__
spec:
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: ping-api
        app.kubernetes.io/component: load-generator
        app.kubernetes.io/part-of: hello-realworld-bench
        hello-real-world/run-set: __RUN_SET_ID__
    spec:
      restartPolicy: Never
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/hostname: homlab
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: k6
          image: __K6_IMAGE__
          imagePullPolicy: IfNotPresent
          args:
            - run
            - /scripts/k6.js
          env:
            - name: BASE_URL
              value: http://target:8080
            - name: DURATION
              value: __K6_DURATION__
            - name: VUS
              value: __K6_VUS__
          resources:
            requests:
              cpu: "4"
              memory: 3Gi
            limits:
              cpu: "4"
              memory: 3Gi
          securityContext:
            privileged: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: script
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: script
          configMap:
            name: k6-script
        - name: tmp
          emptyDir: {}
