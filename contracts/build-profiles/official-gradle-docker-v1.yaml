schema_version: "1.0"
id: official-gradle-docker-v1
contract_version: "1.1"
status: frozen
description: "Frozen Gradle build and Docker Buildx OCI archive profile."
build_tool: gradle
dependency_cache: immutable-fresh-copy-seed
image_cache: base-only-then-first-package-cache
image_input: built-artifact
build:
  image_platform: linux/amd64
  image_output: oci-archive
  workspace: fresh-copy
  source_probe: "0->1"
  operations:
    - gradle_clean_build
    - image_package
    - gradle_incremental_rebuild
    - image_rebuild
  image_cache:
    image_package: base-only
    image_rebuild: first-package
  java_executor:
    image: eclipse-temurin:25-jdk@sha256:68868d04fa9cfd5f5c6abec0b5cef86d8de2bf9c62c37c7d3e4f0f80f5cfd7ff
    cpu: "2"
    memory: 4GiB
    extra_swap: none
    user: "0:0"
  buildkit:
    image: moby/buildkit:buildx-stable-1@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
    builder: per-trial-fresh
    cpu_quota: 200000
    cpu_period: 100000
    memory: 4g
    memory_swap: 4g
