schema_version: "1.0"
id: cold-start-api
contract_version: "1.1"
description: "Lifecycle scenario that measures from the image entrypoint's pre-exec marker to the first valid business response."
kind: lifecycle
question: "How long after a new application process begins execution does it take to complete the first valid business endpoint response?"
measures:
  - repeated entrypoint-pre-exec-to-first-valid-response timing for /ping
  - latency of the first successful /ping request
does_not_measure:
  - sustained throughput
  - warm request latency under load
  - database performance
  - serverless platform cold starts
  - machine boot or cold filesystem page-cache behavior
dependencies: []
variants:
  - id: first-success
    description: "First successful business response after process start."
default_profiles:
  environment_profile: local-docker-compose
  measurement_protocol: cold-start
  load_profile: none

target:
  base_url: "http://localhost:8080"
  endpoint: "/ping"

services:
  postgres: false
  redis: false
  kafka: false
  mock_upstream: false

startup:
  iterations: 5
  poll_interval_seconds: 0.25
  timeout_seconds: 120

load:
  enabled: false

metrics:
  collect:
    - entrypoint_pre_exec_to_first_valid_response_ms
    - first_request_latency
    - entrypoint_pre_exec_to_first_valid_response_min
    - entrypoint_pre_exec_to_first_valid_response_median
    - entrypoint_pre_exec_to_first_valid_response_max
    - first_request_latency_min
    - first_request_latency_median
    - first_request_latency_max
