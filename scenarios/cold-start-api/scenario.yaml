schema_version: "1.0"
id: cold-start-api
contract_version: "1.0"
description: "Startup-focused API scenario that measures the first successful business endpoint response after app start."
kind: lifecycle
question: "How long does the target take to serve the first successful business endpoint response after the application starts?"
measures:
  - repeated time-to-first-success timing for /ping
  - latency of the first successful /ping request
  - basic Docker resource snapshot collection after the final startup sample
does_not_measure:
  - sustained throughput
  - warm request latency under load
  - database performance
  - serverless platform cold starts
dependencies: []
variants:
  - id: first-success
    description: "First successful business response after process start."
contracts:
  environment_profile: local-docker-compose
  measurement_protocol: cold-start
  load_profile: none
  build_profile: local-gradle-docker

target:
  base_url: "http://localhost:8080"
  endpoint: "/ping"

services:
  postgres: false
  redis: false
  kafka: false
  mock_upstream: false

startup:
  iterations: 5
  poll_interval_seconds: 0.25
  timeout_seconds: 120

load:
  enabled: false

metrics:
  collect:
    - startup_ready_time
    - first_request_latency
    - startup_ready_time_min
    - startup_ready_time_median
    - startup_ready_time_p95
    - startup_ready_time_max
    - first_request_latency_min
    - first_request_latency_median
    - first_request_latency_p95
    - first_request_latency_max
    - cpu_percent
    - memory_usage
    - memory_percent
