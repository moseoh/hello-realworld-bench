schema_version: "1.0"
id: ping-api
contract_version: "1.0"
description: "Minimal HTTP ping endpoint used to validate the benchmark runner."
kind: smoke
question: "Can the benchmark runner build, start, load test, collect metrics, and save results for a target implementation?"
measures:
  - runner automation correctness
  - basic HTTP request handling under a short load profile
  - startup first-success timing
  - build and Docker image build timing
  - basic Docker resource snapshot collection
does_not_measure:
  - database performance
  - cache behavior
  - message processing
  - external HTTP aggregation
  - file streaming
  - observability overhead
  - real transactional application behavior
dependencies: []
variants:
  - id: baseline
    description: "Minimal runner smoke contract."
contracts:
  environment_profile: local-docker-compose
  measurement_protocol: development-service
  load_profile: development-local
  build_profile: local-gradle-docker

target:
  base_url: "http://localhost:8080"
  endpoint: "/ping"

services:
  postgres: false
  redis: false
  kafka: false
  mock_upstream: false

load:
  enabled: true
  tool: k6
  script: "scenarios/ping-api/k6.js"
  warmup_duration: "10s"
  test_duration: "30s"
  vus: 50

metrics:
  collect:
    - build_time
    - docker_image_build_time
    - startup_ready_time
    - first_request_latency
    - rps
    - p50_latency
    - p95_latency
    - p99_latency
    - error_rate
    - cpu_percent
    - memory_usage
    - memory_percent
