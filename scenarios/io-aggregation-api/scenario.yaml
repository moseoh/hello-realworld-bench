schema_version: "1.0"
id: io-aggregation-api
contract_version: "1.0"
description: "HTTP API that aggregates several upstream HTTP responses into one response."
kind: service
question: "How does the target behave when a request fans out to multiple upstream HTTP calls and combines the results?"
measures:
  - HTTP client overhead inside the target service
  - parallel upstream request behavior
  - JSON decoding and response composition
  - resource usage while waiting on external HTTP dependencies
does_not_measure:
  - database transactions
  - cache or message broker behavior
  - real internet latency
  - circuit breaker or retry behavior
  - upstream timeout behavior
dependencies:
  - mock-upstream
variants:
  - id: baseline
    description: "All upstream responses complete within the response timeout."
default_profiles:
  environment_profile: local-docker-compose
  measurement_protocol: development-service
  load_profile: development-local

target:
  base_url: "http://localhost:8080"
  startup_path: "/ping"
  endpoint: "/aggregate"

services:
  postgres: false
  redis: false
  kafka: false
  mock_upstream: true

load:
  enabled: true
  tool: k6
  script: "scenarios/io-aggregation-api/k6.js"
  warmup_duration: "15s"
  test_duration: "45s"
  vus: 25

metrics:
  collect:
    - build_time
    - docker_image_build_time
    - dependency_ready_time
    - startup_ready_time
    - first_request_latency
    - rps
    - p50_latency
    - p95_latency
    - p99_latency
    - error_rate
    - cpu_percent
    - memory_usage
    - memory_percent
