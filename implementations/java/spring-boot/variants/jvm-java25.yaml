schema_version: "1.0"
id: jvm-java25
contract_version: "1.2"
description: "Spring Boot JVM variant using Java 25."
implementation: java/spring-boot

runtime:
  java_version: "25"
  spring_boot_version: "4.1.0"
  build_mode: jvm
  native_image: false
  virtual_threads: false
  otel: false

docker:
  image_tag: "hello-realworld/java-spring-boot-jvm-java25:local"

build:
  clean_command:
    - ./gradlew
    - clean
    - build
    - --offline
    - --no-daemon
    - --no-build-cache
  incremental_command:
    - ./gradlew
    - build
    - --offline
    - --no-daemon
    - --no-build-cache
  incremental_input:
    path: src/main/java/org/hellorealworld/benchmark/BuildBenchmarkProbe.java
    from: "public static final int VALUE = 0;"
    to: "public static final int VALUE = 1;"
  application_artifact:
    type: glob
    path: build/libs/*.jar
  dockerfile: Dockerfile
  context: .

kubernetes:
  target_environment:
    SPRING_THREADS_VIRTUAL_ENABLED: "false"
    SPRING_MAIN_KEEP_ALIVE: "false"
