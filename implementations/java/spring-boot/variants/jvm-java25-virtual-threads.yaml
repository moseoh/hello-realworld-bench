schema_version: "1.0"
id: jvm-java25-virtual-threads
contract_version: "1.1"
description: "Spring Boot JVM variant using Java 25 with virtual threads enabled."
implementation: java/spring-boot

runtime:
  java_version: "25"
  spring_boot_version: "4.1.0"
  build_mode: jvm
  native_image: false
  virtual_threads: true
  otel: false

docker:
  image_tag: "hello-realworld/java-spring-boot-jvm-java25-virtual-threads:local"

kubernetes:
  target_environment:
    SPRING_THREADS_VIRTUAL_ENABLED: "true"
    SPRING_MAIN_KEEP_ALIVE: "true"
