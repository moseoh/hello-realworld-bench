quarkus.http.port=8080
quarkus.package.jar.type=fast-jar

mock.upstream.base-url=${MOCK_UPSTREAM_BASE_URL:http://localhost:8081}
aggregation.http.connect-timeout-ms=${AGGREGATION_HTTP_CONNECT_TIMEOUT_MS:500}
aggregation.http.response-timeout-ms=${AGGREGATION_HTTP_RESPONSE_TIMEOUT_MS:1000}
aggregation.http.connection-request-timeout-ms=${AGGREGATION_HTTP_CONNECTION_REQUEST_TIMEOUT_MS:500}
aggregation.http.max-connections=${AGGREGATION_HTTP_MAX_CONNECTIONS:128}
aggregation.http.max-connections-per-route=${AGGREGATION_HTTP_MAX_CONNECTIONS_PER_ROUTE:128}
aggregation.max-concurrent-upstream-requests=${AGGREGATION_MAX_CONCURRENT_UPSTREAM_REQUESTS:128}
aggregation.max-pending-upstream-requests=${AGGREGATION_MAX_PENDING_UPSTREAM_REQUESTS:128}

quarkus.datasource.db-kind=postgresql
quarkus.datasource.active=false
quarkus.hibernate-orm.active=false
quarkus.hibernate-orm.packages=org.hellorealworld.order
quarkus.flyway.active=false

%transactional.quarkus.datasource.active=true
%transactional.quarkus.hibernate-orm.active=true
%transactional.quarkus.hibernate-orm.schema-management.strategy=validate
%transactional.quarkus.flyway.active=true
%transactional.quarkus.flyway.migrate-at-start=true
