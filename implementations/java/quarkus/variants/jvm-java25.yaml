schema_version: "1.0"
id: jvm-java25
contract_version: "1.1"
description: "Quarkus JVM variant using Java 25."
implementation: java/quarkus

runtime:
  java_version: "25"
  framework_version: "3.33.2.1"
  build_mode: jvm
  native_image: false
  virtual_threads: false
  otel: false

docker:
  image_tag: "hello-realworld/java-quarkus-jvm-java25:local"

build:
  clean_command:
    - ./gradlew
    - clean
    - build
    - --offline
    - --no-daemon
    - --no-build-cache
  incremental_command:
    - ./gradlew
    - build
    - --offline
    - --no-daemon
    - --no-build-cache
  incremental_input:
    path: src/main/java/org/hellorealworld/benchmark/BuildBenchmarkProbe.java
    from: "public static final int VALUE = 0;"
    to: "public static final int VALUE = 1;"
  application_artifact:
    type: directory
    path: build/quarkus-app
  dockerfile: Dockerfile
  context: .
